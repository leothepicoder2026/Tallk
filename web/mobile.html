<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Tallk Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./mobile.css">
</head>
<body>
  <div class="app-shell">
    <div class="window">
      <header class="titlebar">
        <div class="brand">Tallk Mobile</div>
        <button id="loginButton" class="primary-button small" type="button">Log In</button>
      </header>

      <section class="status-strip">
        <div id="statusText">Ready</div>
        <div id="callStatusText" class="muted">Click someone in the room to start a voice call.</div>
      </section>

      <nav class="mobile-nav" aria-label="Mobile sections">
        <button class="mobile-nav-button is-active" type="button" data-panel-target="chat">Chat</button>
        <button class="mobile-nav-button" type="button" data-panel-target="people">People</button>
      </nav>

      <main class="content-grid">
        <section class="panel conversation-panel is-active" data-panel="chat">
          <div class="panel-title">Conversation</div>
          <div id="chatArea" class="chat-area" aria-live="polite"></div>
          <form id="messageForm" class="message-form">
            <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off">
            <button type="submit" class="primary-button">Send</button>
          </form>
        </section>

        <aside class="panel people-panel" data-panel="people">
          <div class="panel-title">People Online</div>
          <p class="panel-copy">Click a name to start a voice call.</p>
          <div id="participantsList" class="participants-list"></div>
        </aside>
      </main>
    </div>
  </div>

  <div id="modalRoot"></div>

  <audio id="ringtoneAudio" src="../sounds/call_V2.wav" preload="auto" loop></audio>

  <script type="module" src="./mobile.js"></script>
</body>
</html>
